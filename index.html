<!DOCTYPE html>
<html>
<head>
  <title>Notes App</title>
</head>
<body>

<h2>Register</h2>
<input id="reg_email" placeholder="Email">
<input id="reg_pass" placeholder="Password">
<button onclick="register()">Register</button>

<h2>Login</h2>
<input id="log_email" placeholder="Email">
<input id="log_pass" placeholder="Password">
<button onclick="login()">Login</button>

<hr>

<h2>Note Editor (Auto Save)</h2>
<input id="title" placeholder="Title" oninput="autoSave()">
<input id="content" placeholder="Content" oninput="autoSave()">
<button onclick="newNote()">New Note</button>


<h2>Search</h2>
<input id="search" placeholder="Search notes..." oninput="handleSearch()">


<h2>Your Notes</h2>
<button onclick="loadNotes()">Load Notes</button>
<ul id="notes"></ul>



<script>
let user_id = null;
let currentNoteId = null;
let timeout = null;
let searchTimeout = null; // Separate timeout for search
const API = "https://nginx-production-8f61.up.railway.app";
// Helpers to render UI
function showNotes(data) {
  const notesList = document.getElementById("notes");
  notesList.innerHTML = "";
  data.forEach(n => {
    const li = document.createElement("li");
    // Using textContent for security, but keeping your innerHTML structure
    li.innerHTML = `
      <strong>${n.title}</strong> 
      <button onclick="selectNote(${n.id}, \`${n.title}\`, \`${n.content}\`)">Edit</button>
      <button onclick="deleteNote(${n.id})">Delete</button>
    `;
    notesList.appendChild(li);
  });
}

// SEARCH LOGIC
function handleSearch() {
  if (!user_id) return;
  clearTimeout(searchTimeout);
  const keyword = document.getElementById("search").value;

  searchTimeout = setTimeout(() => {
    fetch(`${API}/search?user_id=${user_id}&q=${keyword}`)
      .then(res => res.json())
      .then(showNotes);
  }, 300);
}

// REST OF YOUR FUNCTIONS
function register() {
  fetch(`${API}/register` , {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: reg_email.value,
      password: reg_pass.value
    })
  }).then(res => res.text()).then(alert);
}

function login() {
  fetch(`${API}/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: log_email.value,
      password: log_pass.value
    })
  })
  .then(res => res.json())
  .then(data => {
    user_id = data.user_id;
    alert("Login success");
    loadNotes(); // Load notes immediately after login
  });
}

function autoSave() {
  if (!user_id) return;
  clearTimeout(timeout);
  timeout = setTimeout(() => {
    const t = document.getElementById("title").value;
    const c = document.getElementById("content").value;
    if (!t && !c) return; // Don't save empty notes

    if (!currentNoteId) {
      fetch(`${API}/add-note`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ user_id, title: t, content: c })
      })
      .then(res => res.json())
      .then(data => {
        currentNoteId = data.note_id;
        loadNotes();
      });
    } else {
      fetch(`${API}/update-note/${currentNoteId}`, {
        method: "PUT",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ title: t, content: c })
      }).then(() => loadNotes());
    }
  }, 500);
}

function loadNotes() {
  if (!user_id) return;
  fetch(`${API}/notes/${user_id}`)
    .then(res => res.json())
    .then(showNotes);
}

function selectNote(id, t, c) {
  currentNoteId = id;
  document.getElementById("title").value = t;
  document.getElementById("content").value = c;
}

function deleteNote(id) {
  fetch(`${API}/delete-note/${id}`, { method: "DELETE" })
    .then(() => {
      if (currentNoteId === id) newNote();
      loadNotes();
    });
}

function newNote() {
  currentNoteId = null;
  document.getElementById("title").value = "";
  document.getElementById("content").value = "";
}

function deleteNote(id) {
  const confirmDelete = confirm("Are you sure you want to delete this note?");

  if (!confirmDelete) return; // ❌ user cancel → dừng

  fetch(`${API}/delete-note/${id}`, {
    method: "DELETE"
  })
  .then(() => {
    if (currentNoteId === id) newNote();
    loadNotes();
  });
}
</script>

</body>
</html>
